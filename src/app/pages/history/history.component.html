<h2>Histórico de Conversões</h2>

<table>

  <tr>
    <th>Origem</th>
    <th>Destino</th>
    <th>Valor</th>
    <th>Resultado</th>
    <th>Data</th>
  </tr>

  <tr *ngFor="let item of history">

    <td>{{item.from}}</td>

    <td>{{item.to}}</td>

    <td>{{item.amount}}</td>

    <td>{{item.result | number:'1.2-2'}}</td>

    <td>{{item.date | date:'dd/MM/yyyy HH:mm'}}</td>

  </tr>

</table>
